  - {type: variant, offset: 3128, length: 1, content: 吾, 宋: 吾從世尊聞如是語苾芻當知若諸有情永斷一法我證彼定得不還果云何一法謂是於欲所以者何一切有情由欲染故數數還來墮諸惡趣受生死苦若能永斷如是一法我證彼定得不還果不復還來生此世間是故我說若諸有情永斷一法我證彼定得不還果爾時世尊重攝此義而說頌曰　我觀諸有情，由欲之所染，還來墮惡道，受生死輪迴，若能正了知，永斷此欲者，定得不還果，不來生世間吾, 元: 吾從世尊聞如是語苾芻當知若諸有情永斷一法我證彼定得不還果云何一法謂是於欲所以者何一切有情由欲染故數數還來墮諸惡趣受生死苦若能永斷如是一法我證彼定得不還果不復還來生此世間是故我說若諸有情永斷一法我證彼定得不還果爾時世尊重攝此義而說頌曰　我觀諸有情，由欲之所染，還來墮惡道，受生死輪迴，若能正了知，永斷此欲者，定得不還果，不來生世間吾, 明: 吾從世尊聞如是語苾芻當知若諸有情永斷一法我證彼定得不還果云何一法謂是於欲所以者何一切有情由欲染故數數還來墮諸惡趣受生死苦若能永斷如是一法我證彼定得不還果不復還來生此世間是故我說若諸有情永斷一法我證彼定得不還果爾時世尊重攝此義而說頌曰　我觀諸有情，由欲之所染，還來墮惡道，受生死輪迴，若能正了知，永斷此欲者，定得不還果，不來生世間吾, 宮: 吾從世尊聞如是語苾芻當知若諸有情永斷一法我證彼定得不還果云何一法謂是於欲所以者何一切有情由欲染故數數還來墮諸惡趣受生死苦若能永斷如是一法我證彼定得不還果不復還來生此世間是故我說若諸有情永斷一法我證彼定得不還果爾時世尊重攝此義而說頌曰　我觀諸有情，由欲之所染，還來墮惡道，受生死輪迴，若能正了知，永斷此欲者，定得不還果，不來生世間吾}
