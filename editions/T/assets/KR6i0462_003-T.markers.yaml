  - {type: variant, offset: 5720, length: 414, content: '挍正後序


      此一卷經宋、鄉則同，同有四十三段，丹本唯有十八段耳。多少如是不同文義，始終逈異如何去取？今撿宋、鄉本經有四大錯，丹有二事以知其正。何則？此卷品名既是二法，則應始終唯說二法；而宋、鄉本經四十三段皆是一法，則名義不相當，是一錯也。又宋、鄉本卷初二段及第三段前六行文，則是諸本初卷三幅《心義經》一段十二行耳。宋、鄉於此三重重寫，是二錯也。第三段中「一類有情」已下，即是諸本初卷七幅《破僧經》一段十七行耳。宋、鄉於此重重寫之，其乃至於四十一重，是三錯也。其卷末頌云「貪欲瞋恚癡，覆藏及惱忿，不恨嫉與慳，耽嗜慢將害」者，即是諸本第二卷九幅結經頌，正云「貪恚及愚癡，覆藏惱忿恨，嫉慳與貪嗜，慢害將一切」之小訛變耳。宋、鄉於此閑重寫之，是四錯也，故知大錯耳。今此丹本十八段經，始從成就二分，終至二果二纏，皆是二法，即與品目名義相當，是一正也。又按諸本，第四卷中七幅有結頌云「為通達律儀，厭知不淨果，纏覺悟宴坐，愧所作尋求」者，則結十二經為一頌。其覺悟已下五經，即是諸本第【CB】【麗-CB】，萬【大】，苐【麗-CB】第K20n0803_p1013a32萬苐K20n0803_p1013a32四卷卷初五經。其纏經、果經已上七經，即是丹本此卷卷末七經耳。則列結相應，是二正也。餘本則非，故今取此丹本為正云。', 宋: '', 元: '', 明: '', 宮: ''}
